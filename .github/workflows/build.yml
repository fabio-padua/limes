name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Limes.sln

      - name: Build
        run: dotnet build Limes.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Limes.sln --configuration Release --no-build --verbosity normal
